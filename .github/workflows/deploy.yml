name: Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate --schema=apps/api/prisma/schema.prisma
      - run: npm run build --workspace apps/api --workspace apps/web
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/lhtuan/unisupport
            git pull
            npm ci
            npx prisma generate --schema=apps/api/prisma/schema.prisma
            npm run build --workspace apps/api --workspace apps/web
            cp -r apps/web/dist/* /srv/unisupport/web/
            sudo systemctl restart unisupport-api.service
