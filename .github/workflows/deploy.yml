# Deploy is handled server-side via cron polling (deploy-poll.sh).
# The server checks for new commits every 5 minutes and auto-deploys.
# This file exists so the workflow doesn't error on push to main.
name: Deploy

on:
  push:
    branches: [main]

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploy handled by server-side cron polling (deploy-poll.sh)"
